<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RV API by Rocky</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      padding: 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    header { text-align: center; padding: 40px 0 30px; }
    header .emoji { font-size: 64px; }
    header h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(90deg, #f093fb, #f5576c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 10px 0 6px;
    }
    header p { color: rgba(255,255,255,0.5); font-size: 14px; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 4px 14px;
      font-size: 12px;
      color: #a8ff78;
      margin-top: 10px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 16px;
      font-weight: 600;
      color: #f093fb;
      margin-bottom: 16px;
    }
    .endpoint-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .method {
      background: linear-gradient(90deg, #f093fb, #f5576c);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 6px;
      min-width: 42px;
      text-align: center;
    }
    .url { font-family: monospace; font-size: 13px; color: #a8ff78; }
    .desc { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 5px; padding-left: 52px; }
    .total-box { text-align: center; padding: 16px; }
    .total-box .number {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(90deg, #a8ff78, #78ffd6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .total-box .label { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; }
    footer { text-align: center; padding: 30px 0 20px; font-size: 12px; color: rgba(255,255,255,0.2); }
    footer a { color: #f093fb; text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="emoji">🎬</div>
    <h1>RV API</h1>
    <p>Random Video API — Powered by Rocky</p>
    <span class="badge">● Live</span>
  </header>

  <div class="card">
    <h2>📡 Endpoints</h2>
    <div class="endpoint-row">
      <span class="method">GET</span>
      <span class="url">/api/rv</span>
    </div>
    <div class="desc">Random video return করে</div>
    <div class="endpoint-row" style="margin-top:10px">
      <span class="method">GET</span>
      <span class="url">/api/list</span>
    </div>
    <div class="desc">মোট কতটা video আছে</div>
    <div class="endpoint-row" style="margin-top:10px">
      <span class="method">POST</span>
      <span class="url">/api/add</span>
    </div>
    <div class="desc">নতুন video add করে</div>
  </div>

  <div class="card">
    <h2>📊 Total Videos</h2>
    <div class="total-box">
      <div class="number" id="totalCount">...</div>
      <div class="label">Videos Available</div>
    </div>
  </div>

  <footer>
    © 2025 Rocky •
    <a href="https://github.com/oldacountrocky303-ship-it/rv-api" target="_blank">GitHub</a>
  </footer>
</div>
<script>
  window.onload = async () => {
    try {
      const res = await fetch("/api/list");
      const data = await res.json();
      document.getElementById("totalCount").textContent = data.total;
    } catch(e) {
      document.getElementById("totalCount").textContent = "?";
    }
  };
</script>
</body>
</html>
